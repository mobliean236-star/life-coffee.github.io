<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Life Coffee</title>

<!-- Google Font pour style premium -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
body { 
  font-family: 'Montserrat', sans-serif; 
  margin: 0; 
  text-align: center; 
  background: #f3f1ed; 
  overflow-x: hidden;
}

header { 
  background: #3e2723; 
  color: white; 
  padding: 20px; 
  font-size: 28px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  gap: 15px;
}

header img { 
  width: 50px; 
  height: 50px; 
  animation: rotateLogo 5s linear infinite;
}

@keyframes rotateLogo {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

.lang-btn {
  margin: 10px;
  padding: 8px 15px;
  border: none;
  cursor: pointer;
  border-radius: 5px;
  background: #6d4c41;
  color: white;
  font-weight: bold;
}

.lang-btn:hover { background: #4e342e; }

.container { 
  display: flex; 
  flex-wrap: wrap; 
  justify-content: center; 
  padding: 20px; 
  gap: 20px;
}

.product {
  background: white;
  margin: 15px;
  padding: 15px;
  width: 260px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  transition: transform 0.3s, box-shadow 0.3s;
}

.product:hover {
  transform: translateY(-10px);
  box-shadow: 0 12px 25px rgba(0,0,0,0.25);
}

.product img {
  width: 100%;
  border-radius: 15px;
  transition: transform 0.3s;
}

.product img:hover { transform: scale(1.05); }

.price { font-size: 18px; margin: 10px 0; color: #3e2723; font-weight: bold; }

button.buy {
  background: #6d4c41;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
}

button.buy:hover { background: #4e342e; }

footer { 
  margin-top: 20px; 
  padding: 15px; 
  background: #3e2723; 
  color: white; 
  font-weight: bold;
}
</style>

<script>
function setLang(lang) {
  if (lang === 'la') {
    document.getElementById('title').innerText = "Life Coffee ☕";
    document.getElementById('sub').innerText = "ກາເຟລາວ - ສົດ ແລະ ອົບອຸ່ນ";

    document.getElementById('p1').innerText = "ກາເຟ Espresso";
    document.getElementById('p2').innerText = "ກາເຟ Cappuccino";
    document.getElementById('p3').innerText = "Matcha Latte";

    document.getElementById('b1').innerText = "ສັ່ງຊື້";
    document.getElementById('b2').innerText = "ສັ່ງຊື້";
    document.getElementById('b3').innerText = "ສັ່ງຊື້";

    document.getElementById('a1').href = "https://wa.me/8562092747227?text=ສະບາຍດີ%20ຂ້ອຍຢາກສັ່ງ%20Espresso";
    document.getElementById('a2').href = "https://wa.me/8562092747227?text=ສະບາຍດີ%20ຂ້ອຍຢາກສັ່ງ%20Cappuccino";
    document.getElementById('a3').href = "https://wa.me/8562092747227?text=ສະບາຍດີ%20ຂ້ອຍຢາກສັ່ງ%20Matcha%20Latte";
  } else {
    document.getElementById('title').innerText = "Life Coffee ☕";
    document.getElementById('sub').innerText = "Fresh Coffee in Laos 🇱🇦";

    document.getElementById('p1').innerText = "Espresso";
    document.getElementById('p2').innerText = "Cappuccino";
    document.getElementById('p3').innerText = "Matcha Latte";

    document.getElementById('b1').innerText = "Order";
    document.getElementById('b2').innerText = "Order";
    document.getElementById('b3').innerText = "Order";

    document.getElementById('a1').href = "https://wa.me/8562092747227?text=Hello%2C%20I%20would%20like%20to%20order%20an%20Espresso";
    document.getElementById('a2').href = "https://wa.me/8562092747227?text=Hello%2C%20I%20would%20like%20to%20order%20a%20Cappuccino";
    document.getElementById('a3').href = "https://wa.me/8562092747227?text=Hello%2C%20I%20would%20like%20to%20order%20a%20Matcha%20Latte";
  }
}
</script>

</head>

<body>

<header>
  <img src="https://instagram.fvte1-2.fna.fbcdn.net/v/t51.82787-19/584396404_17869980852470041_1818696316304274441_n.jpg?efg=eyJ2ZW5jb2RlX3RhZyI6InByb2ZpbGVfcGljLmRqYW5nby4xMDgwLmMyIn0&_nc_ht=instagram.fvte1-2.fna.fbcdn.net&_nc_cat=101&_nc_oc=Q6cZ2gFivCDAG6mKZchlpdSsGDnMlWBMgyN9d-qzdprnc9WqDfVL_9N8RG0B_WAhGk_BAgI&_nc_ohc=5dQGr6Yp8DUQ7kNvwHm5wm2&_nc_gid=aYKuGK9KPc2RFyl2C_Q3LA&edm=AP4sbd4BAAAA&ccb=7-5&oh=00_AfxhD-TzCqw88YZ5Cq0gkttqgd8IPrwAZr72jRliV4jTkw&oe=69CEFCBB&_nc_sid=7a9f4b" alt="Logo Life Coffee">
  <span id="title">Life Coffee ☕</span>
</header>

<p id="sub">Fresh Coffee in Laos 🇱🇦</p>

<button class="lang-btn" onclick="setLang('la')">🇱🇦 Lao</button>
<button class="lang-btn" onclick="setLang('en')">🇬🇧 English</button>

<div class="container">

  <div class="product">
    <img src="https://via.placeholder.com/250" alt="Espresso">
    <h2 id="p1">Espresso</h2>
    <p class="price">40,000 kip</p>
    <a id="a1" href="https://wa.me/8562092747227?text=Hello%2C%20I%20would%20like%20to%20order%20an%20Espresso">
      <button id="b1" class="buy">Order</button>
    </a>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/250" alt="Cappuccino">
    <h2 id="p2">Cappuccino</h2>
    <p class="price">50,000 kip</p>
    <a id="a2" href="https://wa.me/8562092747227?text=Hello%2C%20I%20would%20like%20to%20order%20a%20Cappuccino">
      <button id="b2" class="buy">Order</button>
    </a>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/250" alt="Matcha Latte">
    <h2 id="p3">Matcha Latte</h2>
    <p class="price">60,000 kip</p>
    <a id="a3" href="https://wa.me/8562092747227?text=Hello%2C%20I%20would%20like%20to%20order%20a%20Matcha%20Latte">
      <button id="b3" class="buy">Order</button>
    </a>
  </div>

</div>

<footer>
📲 Commande WhatsApp : 020 9274 7227
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Coffee</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:white;
}

/* HEADER */
.header {
  text-align:center;
  padding:80px 20px;
  background:url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=1400&q=80') center/cover no-repeat;
  position:relative;
}
.header::after {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}
.header h1 {
  position:relative;
  font-size:60px;
  font-weight:900;
  color: #fff; /* texte blanc */
  text-shadow:
    0 0 5px #000,
    0 0 10px #000,
    0 0 20px #000,
    0 0 40px #000,
    0 0 80px #000;
}
.header p {
  position:relative;
  color: #fff; /* SLOWBAR en blanc */
  margin-top:10px;
  font-weight:bold;
  font-size:22px;
  text-shadow: 0 0 5px #000; /* petit shader noir */
}

/* SECTION TITLE */
.section-title {
  text-align:center;
  font-size:22px;
  border-bottom:1px solid #444;
  padding-bottom:10px;
  margin:30px 0 10px 0;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:0 20px 20px 20px;
}

/* CARD */
.card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  position:relative;
  transition:0.3s;
}
.card:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px #0ff;
}
.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}
.card-content {
  padding:10px;
  text-align:center;
}
.price {
  color:#0ff; /* néon bleu futuriste */
  font-weight:bold;
}

/* BEST SELLER */
.badge {
  position:absolute;
  top:10px;
  left:10px;
  background:#0ff;
  color:black;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  animation: pulse 1.2s infinite;
}
@keyframes pulse {
  0% {transform:scale(1);}
  50% {transform:scale(1.1);}
  100% {transform:scale(1);}
}

/* CONTROLS */
.controls {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-top:10px;
}
.controls button {
  background:#0ff;
  border:none;
  width:30px;
  height:30px;
  border-radius:50%;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}
.controls button.adding {
  animation: flash 0.3s;
}
@keyframes flash {
  0% {transform:scale(1);}
  50% {transform:scale(1.4);}
  100% {transform:scale(1);}
}
.qty {
  min-width:20px;
  text-align:center;
}

/* MINI CART FLOAT */
.mini-cart {
  position:fixed;
  top:20px;
  right:20px;
  background:#111;
  border:2px solid #0ff;
  padding:10px 20px;
  border-radius:30px;
  cursor:pointer;
  z-index:999;
  display:flex;
  align-items:center;
  gap:10px;
}
.mini-cart span {
  font-weight:bold;
  color:#0ff;
}

/* CART OVERLAY */
.cart-overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:1000;
}
.cart-overlay .cart-content {
  background:#111;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:400px;
}
.cart-overlay h2 {
  text-align:center;
  margin-bottom:10px;
  color:#0ff;
}
.cart-overlay ul {
  list-style:none;
  padding:0;
  max-height:300px;
  overflow-y:auto;
}
.cart-overlay li {
  display:flex;
  justify-content:space-between;
  padding:5px 0;
  border-bottom:1px solid #444;
}
.cart-overlay button {
  margin-top:10px;
  width:100%;
  padding:10px;
  background:#25D366;
  border:none;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
  color:white;
}
.cart-overlay .close-btn {
  background:#0ff;
  margin-bottom:10px;
  color:black;
}

/* FLOAT BUTTON ORDER DIRECT */
.float-order {
  position:fixed;
  bottom:80px; /* reculé pour ne pas cacher la map */
  left:50%;
  transform:translateX(-50%);
  z-index:999;
}
.float-order button {
  background:#25D366;
  color:white;
  padding:15px 30px;
  border:none;
  border-radius:50px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 15px #25D366;
  transition:0.3s;
}
.float-order button:hover {
  transform:scale(1.05);
  box-shadow:0 0 25px #25D366;
}

/* LOCATION */
.location {
  text-align:center;
  margin:30px 0;
}
.location button {
  padding:10px 20px;
  background:#0ff;
  border:none;
  border-radius:5px;
  cursor:pointer;
  color:black;
}
</style>
</head>

<body>

<div class="header">
  <h1>LIFE COFFEE</h1>
  <p>SLOWBAR</p>
</div>

<div class="section-title">COFFEE</div>
<div id="coffee" class="grid"></div>

<div class="section-title">NON COFFEE</div>
<div id="noncoffee" class="grid"></div>

<div class="location">
  <h2>📍 Location</h2>
  <a href="https://www.google.com/maps?q=19.895000663346558,102.14216503795944" target="_blank">
    <button>Open Map</button>
  </a>
</div>

<div class="mini-cart" onclick="toggleCart()">
  🛒 <span id="mini-count">0</span> | <span id="mini-total">0₭</span>
</div>

<div class="cart-overlay" id="cartOverlay">
  <div class="cart-content">
    <button class="close-btn" onclick="toggleCart()">← Back</button>
    <h2>Your Cart</h2>
    <ul id="cartItems"></ul>
    <button onclick="send()">Order via WhatsApp</button>
  </div>
</div>

<div class="float-order">
  <button onclick="send()">Order & Pay via WhatsApp</button>
</div>

<script>
let cart={};

const coffee=[
{name:"Espresso", price:35000, img:"https://images.unsplash.com/photo-1584270354949-fc7e4ff3d2c1?auto=format&fit=crop&w=400&q=80"},
{name:"Americano", price:30000, img:"https://images.unsplash.com/photo-1605475125393-14edcf6c39f8?auto=format&w=400&q=80"},
{name:"Cappuccino", price:35000, img:"https://images.unsplash.com/photo-1617196030787-556c92a7e8a2?auto=format&w=400&q=80"},
{name:"Latte", price:35000, img:"https://images.unsplash.com/photo-1568931913875-fc68fdd2f4a5?auto=format&w=400&q=80"},
{name:"Mocha", price:40000, img:"https://images.unsplash.com/photo-1584270354949-fc7e4ff3d2c1?auto=format&w=400&q=80"},
{name:"Vanilla Latte", price:40000, img:"https://images.unsplash.com/photo-1622010082151-7fda5f77d8f5?auto=format&w=400&q=80"},
{name:"Caramel Latte", price:45000, img:"https://images.unsplash.com/photo-1617196030787-556c92a7e8a2?auto=format&w=400&q=80"},
{name:"Orange Coffee", price:45000, best:true, img:"https://images.unsplash.com/photo-1605475125393-14edcf6c39f8?auto=format&w=400&q=80"},
{name:"Coconut Coffee", price:45000, best:true, img:"https://images.unsplash.com/photo-1568931913875-fc68fdd2f4a5?auto=format&w=400&q=80"}
];

const noncoffee=[
{name:"Matcha Coconut", price:50000, img:"https://images.unsplash.com/photo-1605475125393-14edcf6c39f8?auto=format&w=400&q=80"},
{name:"Matcha Latte", price:45000, img:"https://images.unsplash.com/photo-1622010082151-7fda5f77d8f5?auto=format&w=400&q=80"},
{name:"Strawberry Milk", price:35000, img:"https://images.unsplash.com/photo-1617196030787-556c92a7e8a2?auto=format&w=400&q=80"},
{name:"Cocoa Strawberry", price:45000, img:"https://images.unsplash.com/photo-1605475125393-14edcf6c39f8?auto=format&w=400&q=80"},
{name:"Cocoa Latte", price:35000, img:"https://images.unsplash.com/photo-1568931913875-fc68fdd2f4a5?auto=format&w=400&q=80"},
{name:"Matcha Strawberry", price:50000, img:"https://images.unsplash.com/photo-1622010082151-7fda5f77d8f5?auto=format&w=400&q=80"},
{name:"Green Tea", price:35000, img:"https://images.unsplash.com/photo-1617196030787-556c92a7e8a2?auto=format&w=400&q=80"},
{name:"Thai Milk Tea", price:35000, img:"https://images.unsplash.com/photo-1605475125393-14edcf6c39f8?auto=format&w=400&q=80"},
{name:"Cocoa Coconut", price:45000, img:"https://images.unsplash.com/photo-1568931913875-fc68fdd2f4a5?auto=format&w=400&q=80"}
];

function add(name, btn){
  cart[name] = (cart[name] || 0) + 1;
  btn.classList.add('adding');
  setTimeout(()=>btn.classList.remove('adding'),300);
  updateMiniCart();
  renderCartOverlay();
  document.getElementById(`qty-${name}`).innerText = cart[name];
}

function remove(name){
  if(cart[name]){
    cart[name]--;
    if(cart[name]<=0) delete cart[name];
  }
  updateMiniCart();
  renderCartOverlay();
  document.getElementById(`qty-${name}`).innerText = cart[name] || 0;
}

function updateMiniCart(){
  let totalQty=0,totalPrice=0;
  [...coffee,...noncoffee].forEach(item=>{
    let qty=cart[item.name]||0;
    totalQty+=qty;
    totalPrice+=qty*item.price;
  });
  document.getElementById('mini-count').innerText=totalQty;
  document.getElementById('mini-total').innerText=totalPrice.toLocaleString()+"₭";
}

function toggleCart(){
  const overlay=document.getElementById('cartOverlay');
  overlay.style.display=overlay.style.display==='flex'?'none':'flex';
}

function renderCartOverlay(){
  const ul=document.getElementById('cartItems');
  ul.innerHTML='';
  for(let item in cart){
    let qty=cart[item];
    let price=[...coffee,...noncoffee].find(m=>m.name===item).price;
    ul.innerHTML+=`<li>${item} x${qty} - ${(qty*price).toLocaleString()}₭</li>`;
  }
}

function send(){
  if(Object.keys(cart).length===0){alert("Please add drinks!"); return;}
  let msg="Order:\n";
  let total=0;
  for(let item in cart){
    let qty=cart[item];
    let price=[...coffee,...noncoffee].find(m=>m.name===item).price;
    total+=price*qty;
    msg+=`${item} x${qty}\n`;
  }
  msg+="Total: "+total.toLocaleString()+"₭";
  window.open("https://wa.me/8562092747227?text="+encodeURIComponent(msg));
}

function renderSection(list, containerId){
  const container=document.getElementById(containerId);
  container.innerHTML='';
  list.forEach(item=>{
    container.innerHTML+=`
      <div class="card">
        ${item.best?'<div class="badge">🔥 BEST SELLER</div>':''}
        <img src="${item.img}">
        <div class="card-content">
          <h3>${item.name}</h3>
          <p class="price">${item.price.toLocaleString()}₭</p>
          <div class="controls">
            <button onclick="remove('${item.name}')">-</button>
            <div id="qty-${item.name}" class="qty">${cart[item.name]||0}</div>
            <button onclick="add('${item.name}',this)">+</button>
          </div>
        </div>
      </div>
    `;
  });
}

function render(){
  renderSection(coffee,'coffee');
  renderSection(noncoffee,'noncoffee');
}

render();
</script>

</body>
</html>

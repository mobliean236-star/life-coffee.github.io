<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Life Coffee</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: black;
  color: white;
}

/* Header */
.header {
  text-align: center;
  padding: 20px;
}

.header h1 {
  font-size: 48px;
  color: white;
  text-shadow: 0 0 15px black;
}

.header p {
  color: white;
  text-shadow: 0 0 10px black;
  font-size: 24px;
}

/* Section titles */
.section-title {
  text-align: center;
  margin-top: 30px;
  font-size: 22px;
  border-bottom: 1px solid #444;
  padding-bottom: 10px;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* Card */
.card {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #0ff;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

.price {
  color: #0ff; /* neon blue for prices */
  font-weight: bold;
}

/* Floating buttons */
.float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.float a button {
  padding: 12px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-weight: bold;
}

/* WhatsApp */
.whatsapp {
  background: #25D366;
  color: white;
}

/* Map button */
.mapbtn {
  background: #0ff;
  color: black;
}

/* Cart */
#cart {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #111;
  padding: 15px;
  border-radius: 10px;
  width: 250px;
  max-height: 400px;
  overflow-y: auto;
  box-shadow: 0 0 20px #0ff;
}

#cart h3 {
  margin: 0 0 10px 0;
  color: #0ff;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 5px;
}

/* BCEL QR Section */
#bcel-qr {
  text-align: center;
  margin: 30px 0;
}

#bcel-qr h2 {
  color: #0ff;
  font-size: 28px;
  text-shadow: 0 0 10px #0ff;
}

#bcel-qr img {
  width: 200px;
  height: 200px;
  border-radius: 15px;
  box-shadow: 0 0 20px #0ff;
}

#bcel-qr p {
  color: white;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
  <h1>LIFE COFFEE</h1>
  <p>SLOW BAR</p>
</div>

<div class="section-title">COFFEE</div>
<div id="coffee" class="grid"></div>

<div class="section-title">NON COFFEE</div>
<div id="noncoffee" class="grid"></div>

<!-- Cart -->
<div id="cart">
  <h3>Cart</h3>
  <div id="cart-items"></div>
  <p><strong>Total:</strong> <span id="cart-total">0</span>k</p>
  <button onclick="payBCEL()">Order & Pay via BCEL</button>
</div>

<!-- BCEL QR Section -->
<div id="bcel-qr">
  <h2>Pay via BCEL</h2>
  <img src="d0237a2a-738d-4c39-b6f0-aa184658388e.png" alt="BCEL QR Code">
  <p>Scan this QR code with BCEL app to pay</p>
  <p style="color:#0ff;" id="order-code-display"></p>
</div>

<!-- Floating buttons -->
<div class="float">
  <a href="https://wa.me/8562092747227" target="_blank"><button class="whatsapp">WhatsApp</button></a>
  <a href="https://www.google.com/maps?q=19.895000663346558,102.14216503795944" target="_blank"><button class="mapbtn">Map</button></a>
</div>

<script>
// Menu
const coffee = [
  {name:"Espresso", price:35},
  {name:"Americano", price:30},
  {name:"Cappuccino", price:35},
  {name:"Latte", price:35},
  {name:"Mocha", price:40},
  {name:"Vanila latte", price:40},
  {name:"Caramel latte", price:45},
  {name:"Orange coffee", price:45},
  {name:"Coconut coffee", price:45}
];

const noncoffee = [
  {name:"Matcha coconut", price:50},
  {name:"Matcha Latte", price:45},
  {name:"Strawberry milk", price:35},
  {name:"Cocoa strawberry", price:45},
  {name:"Cocoalate", price:35},
  {name:"Matcha Strawberry", price:50},
  {name:"Green tea", price:35},
  {name:"Thai milk tea", price:35},
  {name:"Cocoa coconut", price:45}
];

// Cart
let cart = [];

// Render categories
function renderCategory(list, containerId){
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  list.forEach(item => {
    container.innerHTML += `
      <div class="card" onclick="addToCart('${item.name}',${item.price})">
        <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=400&q=80">
        <div class="card-content">
          <h3>${item.name}</h3>
          <p class="price">${item.price}k</p>
        </div>
      </div>
    `;
  });
}

// Add to cart
function addToCart(name, price){
  const existing = cart.find(i => i.name === name);
  if(existing){
    existing.qty++;
  } else {
    cart.push({name, price, qty:1});
  }
  updateCart();
}

// Update cart display
function updateCart(){
  const container = document.getElementById('cart-items');
  container.innerHTML = "";
  let total = 0;
  cart.forEach(item => {
    container.innerHTML += `<div class="cart-item">${item.name} x${item.qty} - ${item.price*item.qty}k</div>`;
    total += item.price * item.qty;
  });
  document.getElementById('cart-total').innerText = total;
}

// Generate unique order code
function generateOrderCode() {
  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const numbers = '0123456789';
  let code = 'ORD';
  for(let i=0;i<3;i++) code += letters[Math.floor(Math.random()*letters.length)];
  for(let i=0;i<3;i++) code += numbers[Math.floor(Math.random()*numbers.length)];
  return code;
}

// Pay via BCEL
function payBCEL(){
  if(cart.length === 0){
    alert("Your cart is empty!");
    return;
  }
  const code = generateOrderCode();
  document.getElementById('order-code-display').innerText = "Your order code: " + code;
  alert("Your order code: " + code + "\nScan the BCEL QR code to pay.");
}

// Initial render
renderCategory(coffee, "coffee");
renderCategory(noncoffee, "noncoffee");

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Coffee</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #000;
  color: #fff;
}

/* HEADER */
.header {
  text-align: center;
  padding: 70px 20px;
  background: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=1400&q=80') center/cover;
  position: relative;
}

.header::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

.header h1 {
  position: relative;
  font-size: 50px;
  margin: 0;
  background: linear-gradient(90deg,#c8a97e,#fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header p {
  position: relative;
  color: #c8a97e;
  font-size: 22px;
}

/* TITLES */
.section-title {
  text-align: center;
  margin: 40px 0 20px;
  font-size: 26px;
  border-bottom: 2px solid #333;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  background: #111;
  border-radius: 15px;
  overflow: hidden;
  position: relative;
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card-content {
  padding: 12px;
  text-align: center;
}

.price {
  color: #c8a97e;
  font-weight: bold;
}

/* BUTTON ADD */
.add-btn {
  margin-top: 10px;
  background: #c8a97e;
  border: none;
  padding: 10px;
  border-radius: 30px;
  cursor: pointer;
  width: 100%;
  font-weight: bold;
}

/* BEST SELLER */
.badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: #c8a97e;
  color: black;
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
}

/* CART */
.cart {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #111;
  padding: 15px;
  box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
}

.cart button {
  width: 100%;
  padding: 15px;
  background: #25D366;
  border: none;
  color: white;
  font-weight: bold;
  border-radius: 30px;
}

/* FLOAT */
.float {
  position: fixed;
  bottom: 90px;
  right: 20px;
}

.mapbtn {
  padding: 12px 20px;
  background: #c8a97e;
  border: none;
  border-radius: 50px;
}
</style>

<script>
let cart = [];

const coffee = [
  {name:"Espresso", price:"35k"},
  {name:"Americano", price:"30k"},
  {name:"Cappuccino", price:"35k"},
  {name:"Latte", price:"35k"},
  {name:"Mocha", price:"40k"},
  {name:"Vanilla Latte", price:"40k"},
  {name:"Caramel Latte", price:"45k"},
  {name:"Orange Coffee", price:"45k", best:true},
  {name:"Coconut Coffee", price:"45k", best:true}
];

const noncoffee = [
  {name:"Matcha Coconut", price:"50k"},
  {name:"Matcha Latte", price:"45k"},
  {name:"Strawberry Milk", price:"35k"},
  {name:"Cocoa Strawberry", price:"45k"},
  {name:"Cocoa Latte", price:"35k"},
  {name:"Matcha Strawberry", price:"50k"},
  {name:"Green Tea", price:"35k"},
  {name:"Thai Milk Tea", price:"35k"},
  {name:"Cocoa Coconut", price:"45k"}
];

// ADD TO CART
function addToCart(name){
  cart.push(name);
  updateCart();
}

// UPDATE CART BUTTON
function updateCart(){
  document.getElementById("cart-count").innerText = cart.length;
}

// SEND ORDER
function sendOrder(){
  if(cart.length === 0){
    alert("Cart is empty");
    return;
  }

  let message = "Hello, I would like to order:\n";
  cart.forEach(item => message += "- " + item + "\n");

  window.open("https://wa.me/8562092747227?text=" + encodeURIComponent(message));
}

// RENDER
function renderCategory(list,id){
  const container = document.getElementById(id);
  container.innerHTML="";
  list.forEach(item=>{
    container.innerHTML+=`
      <div class="card">
        ${item.best ? '<div class="badge">🔥 BEST SELLER</div>' : ''}
        <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
        <div class="card-content">
          <h3>${item.name}</h3>
          <p class="price">${item.price}</p>
          <button class="add-btn" onclick="addToCart('${item.name}')">ADD TO ORDER</button>
        </div>
      </div>
    `;
  });
}

function init(){
  renderCategory(coffee,"coffee");
  renderCategory(noncoffee,"noncoffee");
}
</script>
</head>

<body onload="init()">

<div class="header">
  <h1>LIFE COFFEE</h1>
  <p>SLOWBAR</p>
</div>

<div class="section-title">COFFEE</div>
<div id="coffee" class="grid"></div>

<div class="section-title">NON COFFEE</div>
<div id="noncoffee" class="grid"></div>

<!-- CART -->
<div class="cart">
  <button onclick="sendOrder()">
    🛒 Order on WhatsApp (<span id="cart-count">0</span>)
  </button>
</div>

<!-- MAP -->
<div class="float">
  <a href="https://www.google.com/maps?q=19.895000663346558,102.14216503795944">
    <button class="mapbtn">Map</button>
  </a>
</div>

</body>
</html>

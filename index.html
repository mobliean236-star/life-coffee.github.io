<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Life Coffee</title>
  <style>
    body {
      font-family: Arial;
      background: #f3f1ed;
      margin: 0;
      text-align: center;
    }

    header {
      background: #3e2723;
      color: white;
      padding: 25px;
      font-size: 28px;
    }

    .subtitle {
      margin: 10px;
      color: #555;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .product {
      background: white;
      border-radius: 10px;
      padding: 15px;
      margin: 15px;
      width: 260px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      font-size: 18px;
      margin: 10px 0;
      color: #3e2723;
    }

    button {
      background: #6d4c41;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #4e342e;
    }

    footer {
      margin-top: 20px;
      padding: 15px;
      background: #3e2723;
      color: white;
    }
  </style>
</head>

<body>

<header>☕ Life Coffee</header>
<p class="subtitle">Café du Laos 🇱🇦 - Frais & Authentique</p>

<div class="container">

  <!-- Produit 1 -->
  <div class="product">
    <img src="https://via.placeholder.com/250" alt="Café grains">
    <h2>Café en grains</h2>
    <p class="price">120,000 kip</p>
    <a href="https://wa.me/8562092747227?text=Bonjour%20je%20veux%20acheter%20le%20café%20en%20grains%20Life%20Coffee">
      <button>Commander</button>
    </a>
  </div>

  <!-- Produit 2 -->
  <div class="product">
    <img src="https://via.placeholder.com/250" alt="Café moulu">
    <h2>Café moulu</h2>
    <p class="price">100,000 kip</p>
    <a href="https://wa.me/8562092747227?text=Bonjour%20je%20veux%20acheter%20le%20café%20moulu%20Life%20Coffee">
      <button>Commander</button>
    </a>
  </div>

  <!-- Produit 3 -->
  <div class="product">
    <img src="https://via.placeholder.com/250" alt="Café premium">
    <h2>Café Premium</h2>
    <p class="price">150,000 kip</p>
    <a href="https://wa.me/8562092747227?text=Bonjour%20je%20veux%20acheter%20le%20café%20premium%20Life%20Coffee">
      <button>Commander</button>
    </a>
  </div>

</div>

<footer>
📲 Commande WhatsApp : 020 9274 7227
</footer>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Life Coffee</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #000;
  color: white;
}

/* Header */
.header {
  text-align: center;
  padding: 20px;
}

/* Language buttons */
.lang {
  text-align: center;
  margin-bottom: 20px;
}

.lang button {
  margin: 5px;
  padding: 8px 15px;
  border: none;
  background: #c8a97e;
  cursor: pointer;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* Card */
.card {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

.price {
  color: #c8a97e;
}

/* Section title */
.section {
  padding: 20px;
  font-size: 20px;
  border-bottom: 1px solid #333;
}
</style>

<script>
let currentLang = "en";

const products = [
  {name_en:"Espresso", name_la:"ກາເຟ Espresso", price:"35k"},
  {name_en:"Americano", name_la:"Americano", price:"30k"},
  {name_en:"Cappuccino", name_la:"Cappuccino", price:"35k"},
  {name_en:"Latte", name_la:"Latte", price:"35k"},
  {name_en:"Mocha", name_la:"Mocha", price:"40k"},
  {name_en:"Matcha Latte", name_la:"Matcha Latte", price:"45k"},
  {name_en:"Thai milk tea", name_la:"ຊານົມໄທ", price:"35k"}
];

function setLang(lang){
  currentLang = lang;
  render();
}

function order(name){
  let text = currentLang === "la"
    ? "ຂ້ອຍຢາກສັ່ງ " + name
    : "Hello, I would like to order " + name;

  window.open("https://wa.me/8562092747227?text=" + encodeURIComponent(text));
}

function render(){
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(p => {
    const name = currentLang === "la" ? p.name_la : p.name_en;

    container.innerHTML += `
      <div class="card" onclick="order('${name}')">
        <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348?auto=format&fit=crop&w=400&q=80">
        <div class="card-content">
          <h3>${name}</h3>
          <p class="price">${p.price}</p>
        </div>
      </div>
    `;
  });
}
</script>

</head>

<body onload="render()">

<div class="header">
  <h1>LIFE COFFEE</h1>
  <p style="color:#c8a97e;">SLOWBAR</p>
</div>

<div class="lang">
  <button onclick="setLang('en')">English</button>
  <button onclick="setLang('la')">Lao</button>
</div>

<div class="section">Menu</div>

<div id="products" class="grid"></div>

</body>
</html>

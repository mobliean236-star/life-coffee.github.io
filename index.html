<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Coffee</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: black;
  color: white;
}

/* Header */
.header {
  text-align: center;
  padding: 20px;
}

.header h1 {
  margin: 0;
}

.header p {
  margin: 5px 0 0;
  color: #c8a97e;
}

/* Section title */
.section-title {
  text-align: center;
  margin-top: 30px;
  font-size: 22px;
  border-bottom: 1px solid #444;
  padding-bottom: 10px;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* Card */
.card {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

.price {
  color: #c8a97e;
}

/* Floating buttons */
.float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.float a {
  text-decoration: none;
}

.float button {
  padding: 12px 20px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-weight: bold;
}

/* WhatsApp */
.whatsapp {
  background: #25D366;
  color: white;
}

/* Map button */
.mapbtn {
  background: #c8a97e;
  color: black;
}
</style>

<script>
// Données des boissons (ajoute le champ img pour chaque boisson)
const coffee = [
  {name:"Espresso", price:"35₭", img:"images/espresso.jpg"},
  {name:"Americano", price:"30₭", img:"images/americano.jpg"},
  {name:"Cappuccino", price:"35₭", img:"images/cappuccino.jpg"},
  {name:"Latte", price:"35₭", img:"images/latte.jpg"},
  {name:"Mocha", price:"40₭", img:"images/mocha.jpg"},
  {name:"Vanilla Latte", price:"40₭", img:"images/vanilla_latte.jpg"},
  {name:"Caramel Latte", price:"45₭", img:"images/caramel_latte.jpg"},
  {name:"Orange Coffee", price:"45₭", img:"images/orange_coffee.jpg"},
  {name:"Coconut Coffee", price:"45₭", img:"images/coconut_coffee.jpg"}
];

const noncoffee = [
  {name:"Matcha Coconut", price:"50₭", img:"images/matcha_coconut.jpg"},
  {name:"Matcha Latte", price:"45₭", img:"images/matcha_latte.jpg"},
  {name:"Strawberry Milk", price:"35₭", img:"images/strawberry_milk.jpg"},
  {name:"Cocoa Strawberry", price:"45₭", img:"images/cocoa_strawberry.jpg"},
  {name:"Cocoa Latte", price:"35₭", img:"images/cocoa_latte.jpg"},
  {name:"Matcha Strawberry", price:"50₭", img:"images/matcha_strawberry.jpg"},
  {name:"Green Tea", price:"35₭", img:"images/green_tea.jpg"},
  {name:"Thai Milk Tea", price:"35₭", img:"images/thai_milk_tea.jpg"},
  {name:"Cocoa Coconut", price:"45₭", img:"images/cocoa_coconut.jpg"}
];

// Ouvrir WhatsApp pour passer commande
function order(name){
  const text = "Hello, I would like to order " + name;
  window.open("https://wa.me/8562092747227?text=" + encodeURIComponent(text), "_blank");
}

// Afficher les boissons
function renderCategory(list, containerId){
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  list.forEach(item => {
    container.innerHTML += `
      <div class="card" onclick="order('${item.name}')">
        <img src="${item.img}" alt="${item.name}">
        <div class="card-content">
          <h3>${item.name}</h3>
          <p class="price">${item.price}</p>
        </div>
      </div>
    `;
  });
}

function render(){
  renderCategory(coffee, "coffee");
  renderCategory(noncoffee, "noncoffee");
}
</script>
</head>

<body onload="render()">

<div class="header">
  <h1>LIFE COFFEE</h1>
  <p>SLOWBAR</p>
</div>

<div class="section-title">COFFEE</div>
<div id="coffee" class="grid"></div>

<div class="section-title">NON COFFEE</div>
<div id="noncoffee" class="grid"></div>

<!-- MAP -->
<div style="text-align:center; padding:30px;">
  <h2 style="color:#c8a97e;">📍 Location</h2>
  <a href="https://www.google.com/maps?q=19.895000663346558,102.14216503795944" target="_blank">
    <button style="padding:10px 20px; background:#c8a97e; border:none; border-radius:5px;">
      Open Map
    </button>
  </a>
</div>

<div style="padding:20px;">
  <iframe 
    src="https://www.google.com/maps?q=19.895000663346558,102.14216503795944&output=embed"
    width="100%" 
    height="300" 
    style="border:0; border-radius:10px;">
  </iframe>
</div>

<!-- FLOATING BUTTONS -->
<div class="float">
  <a href="https://wa.me/8562092747227" target="_blank">
    <button class="whatsapp">WhatsApp</button>
  </a>
  <a href="https://www.google.com/maps?q=19.895000663346558,102.14216503795944" target="_blank">
    <button class="mapbtn">Map</button>
  </a>
</div>

</body>
</html>

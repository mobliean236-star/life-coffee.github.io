<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Coffee</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:white;
}

/* HEADER */
.header {
  position:relative;
  height:90vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1400&q=80') center/cover no-repeat;
}

.overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:1;
}

.header-content {
  position:relative;
  z-index:2;
}
.header-content h1 {
  font-size:70px;
  font-weight:900;
}
.header-content p {
  font-size:22px;
  opacity:0.9;
}

/* SECTION TITLE */
.section-title {
  text-align:center;
  font-size:24px;
  margin:40px 0 20px;
  letter-spacing:2px;
  color:#8fbc8f; /* vert gris */
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
  padding:0 25px 30px;
}

/* CARD */
.card {
  background:#111;
  border-radius:20px;
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 5px 15px rgba(0,0,0,0.5);
  position:relative;
}
.card:hover {
  transform:translateY(-8px);
  box-shadow:0 10px 25px rgba(143,188,143,0.4);
}

/* IMAGE */
.card img {
  width:100%;
  aspect-ratio:357/238;
  object-fit:cover;
  transition:0.4s;
}
.card:hover img {
  transform:scale(1.08);
}

/* CONTENT */
.card-content {
  padding:15px;
  text-align:center;
}
.card-content h3 {
  margin:10px 0 5px;
}
.price {
  color:#8fbc8f; /* vert gris */
  font-weight:bold;
  margin-bottom:10px;
}

/* BEST SELLER BADGE */
.badge {
  position:absolute;
  top:12px;
  left:12px;
  background:#8fbc8f;
  color:black;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
}

/* CONTROLS */
.controls {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}
.controls button {
  background:#8fbc8f;
  border:none;
  width:32px;
  height:32px;
  border-radius:50%;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}
.controls button:hover {
  transform:scale(1.2);
}
.qty {
  min-width:25px;
}

/* MINI CART */
.mini-cart {
  position:fixed;
  top:20px;
  right:20px;
  background:#111;
  border:2px solid #8fbc8f;
  padding:12px 20px;
  border-radius:30px;
  display:flex;
  gap:10px;
  align-items:center;
  cursor:pointer;
}

/* CART */
.cart-overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}
.cart-content {
  background:#111;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:400px;
}
.cart-content h2 {
  text-align:center;
  color:#8fbc8f;
}
.cart-content button {
  margin-top:10px;
  width:100%;
  padding:12px;
  background:#32cd32;
  border:none;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
}

/* FLOAT BUTTON */
.float-order button {
  background:#32cd32;
  padding:15px 35px;
  border:none;
  border-radius:50px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 20px #32cd32;
}

/* LOCATION */
.location {
  text-align:center;
  margin:40px 0;
}
#map {
  width:90%;
  max-width:600px;
  height:300px;
  margin:20px auto;
  border-radius:15px;
  border:2px solid #8fbc8f;
}
.location button {
  background:#8fbc8f;
  border:none;
  padding:10px 25px;
  border-radius:10px;
  cursor:pointer;
  color:black;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <div class="overlay"></div>
  <div class="header-content">
    <h1>LIFE COFFEE</h1>
    <p>SLOWBAR</p>
  </div>
</div>

<div class="section-title">COFFEE</div>
<div id="coffee" class="grid"></div>

<div class="section-title">NON COFFEE</div>
<div id="noncoffee" class="grid"></div>

<div class="location">
  <h2>📍 Location</h2>
  <div id="map"></div>
  <a href="https://www.google.com/maps?q=19.895000663346558,102.14216503795944" target="_blank">
    <button>Open Map / Itinéraire</button>
  </a>
</div>

<div class="mini-cart" onclick="toggleCart()">
  🛒 <span id="mini-count">0</span> | <span id="mini-total">0₭</span>
</div>

<div class="cart-overlay" id="cartOverlay">
  <div class="cart-content">
    <button class="close-btn" onclick="toggleCart()">← Back</button>
    <h2>Your Cart</h2>
    <ul id="cartItems"></ul>
    <button onclick="send()">Order via WhatsApp</button>
  </div>
</div>

<div class="float-order">
  <button onclick="send()">Order & Pay via WhatsApp</button>
</div>

<script>
let cart={};

const coffee=[
{name:"Espresso", price:35000, img:"https://upload.wikimedia.org/wikipedia/commons/4/45/A_small_cup_of_coffee.JPG"},
{name:"Americano", price:30000, img:"https://lh3.googleusercontent.com/p/AF1QipMNIdVxrmejBbUAPNpJhInWns6-J2CF5G0gm-yM=s1024-v1"},
{name:"Cappuccino", price:35000, img:"https://lh3.googleusercontent.com/p/AF1QipMKMworzi8s5GbMqYHpoA1Ok1PmYv_CuVIKj2h5=s1024-v1"},
{name:"Latte", price:35000, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQN0E1O-YwNwqRIw53AsEAXKXtYryjiOCBaMg&s"},
{name:"Mocha", price:40000, img:"https://st2.depositphotos.com/2894449/43042/i/450/depositphotos_430427264-stock-photo-iced-mocha-plastic-cup-table.jpg"},
{name:"Vanilla Latte", price:40000, img:"https://img.freepik.com/free-photo/cold-beverage-plastic-cup-mockup_53876-74663.jpg?semt=ais_incoming&w=740&q=80"},
{name:"Caramel Latte", price:45000, img:"https://img.freepik.com/free-photo/cold-beverage-plastic-cup-mockup_53876-74663.jpg?semt=ais_incoming&w=740&q=80"},
{name:"Orange Coffee", price:45000, best:true, img:"https://lh3.googleusercontent.com/p/AF1QipNzVKul2lBkuLGKG3hraz9j7hPP255Sb8P48bgG=s508-k-no"},
{name:"Coconut Coffee", price:45000, best:true, img:"https://epe.brightspotcdn.com/d8/a4/212af2ed131184894538c9cd77ea/not-yet-1426593-640.png"},
];

const noncoffee=[
{name:"Matcha Coconut", price:50000, img:"https://www.shutterstock.com/image-photo/plastic-cup-that-half-filled-600nw-2637783491.jpg"},
{name:"Matcha Latte", price:45000, img:"https://epe.brightspotcdn.com/d8/a4/212af2ed131184894538c9cd77ea/not-yet-1426593-640.png"},
{name:"Strawberry Milk", price:35000, img:"https://upload.wikimedia.org/wikipedia/commons/1/15/Strawberry_Milk.jpg"},
{name:"Cocoa Strawberry", price:45000, img:"https://upload.wikimedia.org/wikipedia/commons/f/f8/Cocoa_Strawberry.jpg"},
{name:"Cocoa Latte", price:35000, img:"https://upload.wikimedia.org/wikipedia/commons/5/5e/Cocoa_Latte.jpg"},
{name:"Matcha Strawberry", price:50000, img:"https://upload.wikimedia.org/wikipedia/commons/3/30/Matcha_Strawberry.jpg"},
{name:"Green Tea", price:35000, img:"https://upload.wikimedia.org/wikipedia/commons/2/2b/Green_Tea.jpg"},
{name:"Thai Milk Tea", price:35000, img:"https://upload.wikimedia.org/wikipedia/commons/1/17/Thai_Milk_Tea.jpg"},
{name:"Cocoa Coconut", price:45000, img:"https://upload.wikimedia.org/wikipedia/commons/4/45/Cocoa_Coconut.jpg"}
];

function add(name, btn){
  cart[name] = (cart[name] || 0) + 1;
  btn.classList.add('adding');
  setTimeout(()=>btn.classList.remove('adding'),300);
  updateMiniCart();
  renderCartOverlay();
  document.getElementById(`qty-${name}`).innerText = cart[name];
}

function remove(name){
  if(cart[name]){
    cart[name]--;
    if(cart[name]<=0) delete cart[name];
  }
  updateMiniCart();
  renderCartOverlay();
  document.getElementById(`qty-${name}`).innerText = cart[name] || 0;
}

function updateMiniCart(){
  let totalQty=0,totalPrice=0;
  [...coffee,...noncoffee].forEach(item=>{
    let qty=cart[item.name]||0;
    totalQty+=qty;
    totalPrice+=qty*item.price;
  });
  document.getElementById('mini-count').innerText=totalQty;
  document.getElementById('mini-total').innerText=totalPrice.toLocaleString()+"₭";
}

function toggleCart(){
  const overlay=document.getElementById('cartOverlay');
  overlay.style.display=overlay.style.display==='flex'?'none':'flex';
}

function renderCartOverlay(){
  const ul=document.getElementById('cartItems');
  ul.innerHTML='';
  for(let item in cart){
    let qty=cart[item];
    let price=[...coffee,...noncoffee].find(m=>m.name===item).price;
    ul.innerHTML+=`<li>${item} x${qty} - ${(qty*price).toLocaleString()}₭</li>`;
  }
}

function send(){
  if(Object.keys(cart).length===0){alert("Please add drinks!"); return;}
  
  let clientName = '';
  while(true){
    clientName = prompt("Veuillez entrer votre nom :","");
    if(clientName && clientName.trim() !== "") break;
    alert("Le nom est requis pour passer la commande !");
  }

  const orderId = 'ODR' + Math.floor(1000 + Math.random() * 9000);
  let msg=`Order ${orderId} - ${clientName}:\n`;
  let total=0;
  for(let item in cart){
    let qty=cart[item];
    let price=[...coffee,...noncoffee].find(m=>m.name===item).price;
    total+=price*qty;
    msg+=`${item} x${qty}\n`;
  }
  msg+="Total: "+total.toLocaleString()+"₭";
  window.open("https://wa.me/8562092747227?text="+encodeURIComponent(msg));
}

function renderSection(list, containerId){
  const container=document.getElementById(containerId);
  container.innerHTML='';
  list.forEach(item=>{
    container.innerHTML+=`
      <div class="card">
        ${item.best?'<div class="badge">🔥 BEST SELLER</div>':''}
        <img src="${item.img}">
        <div class="card-content">
          <h3>${item.name}</h3>
          <p class="price">${item.price.toLocaleString()}₭</p>
          <div class="controls">
            <button onclick="remove('${item.name}')">-</button>
            <div id="qty-${item.name}" class="qty">${cart[item.name]||0}</div>
            <button onclick="add('${item.name}',this)">+</button>
          </div>
        </div>
      </div>
    `;
  });
}

function render(){
  renderSection(coffee,'coffee');
  renderSection(noncoffee,'noncoffee');
}

render();

/* MAP */
function initMap(){
  const mapDiv = document.getElementById("map");
  const iframe = document.createElement("iframe");
  iframe.width="100%";
  iframe.height="100%";
  iframe.style.border="0";
  iframe.loading="lazy";
  iframe.referrerPolicy="no-referrer-when-downgrade";
  iframe.src="https://www.google.com/maps/embed/v1/place?key=YOUR_GOOGLE_MAPS_API_KEY&q=19.895000663346558,102.14216503795944";
  mapDiv.appendChild(iframe);
}
initMap();
</script>

</body>
</html>

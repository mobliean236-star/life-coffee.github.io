<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Coffee</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:white;
  text-align:center;
}

/* HEADER */
.header {
  position:relative;
  height:90vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1400&q=80') no-repeat center center/cover;
}

/* DARK OVERLAY */
.overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:1;
}

/* TEXT */
.header-content {
  position:relative;
  z-index:2;
}
.header-content h1 {
  font-size:70px;
  font-weight:900;
  letter-spacing:2px;
}
.header-content p {
  font-size:22px;
  opacity:0.9;
}

/* SECTION TITLE */
.section-title {
  text-align:center;
  font-size:24px;
  margin:40px 0 20px;
  letter-spacing:2px;
  color:grey;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
  padding:0 25px 30px;
  justify-items:center;
}

/* CARD */
.card {
  background:#111;
  border-radius:20px;
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 5px 15px rgba(0,0,0,0.5);
  width:220px;
  position:relative;
}
.card:hover {
  transform:translateY(-8px);
  box-shadow:0 10px 25px rgba(128,128,128,0.5);
}

/* IMAGE */
.card img {
  width:100%;
  height:250px;
  object-fit:contain;
  transition:0.4s;
}
.card:hover img {
  transform:scale(1.05);
}

/* CONTENT */
.card-content {
  padding:15px;
  text-align:center;
}
.card-content h3 {
  margin:10px 0 5px;
}
.price {
  color:grey;
  font-weight:bold;
  margin-bottom:10px;
}

/* BEST SELLER */
.badge {
  position:absolute;
  top:12px;
  left:12px;
  background:grey;
  color:black;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
}

/* CONTROLS */
.controls {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}
.controls button {
  background:grey;
  border:none;
  width:32px;
  height:32px;
  border-radius:50%;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}
.controls button:hover {
  transform:scale(1.2);
}
.qty {
  min-width:25px;
}

/* MINI CART */
.mini-cart {
  position:fixed;
  top:20px;
  right:20px;
  background:#111;
  border:2px solid grey;
  padding:12px 20px;
  border-radius:30px;
  display:flex;
  gap:10px;
  align-items:center;
  cursor:pointer;
}

/* CART */
.cart-overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}
.cart-content {
  background:#111;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:400px;
}
.cart-content h2 {
  text-align:center;
  color:grey;
}
.cart-content button {
  margin-top:10px;
  width:100%;
  padding:12px;
  background:#25D366;
  border:none;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
}

/* FLOAT BUTTON */
.float-order button {
  background:#25D366;
  padding:15px 35px;
  border:none;
  border-radius:50px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 20px #25D366;
}

/* LOCATION */
.location {
  text-align:center;
  margin:40px 0;
}
.location h2 {
  margin-bottom:20px;
}
.location iframe {
  border-radius:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="header">
  <div class="overlay"></div>
  <div class="header-content">
    <h1>LIFE COFFEE</h1>
    <p>SLOWBAR</p>
  </div>
</div>

<div class="section-title">COFFEE</div>
<div id="coffee" class="grid"></div>

<div class="section-title">NON COFFEE</div>
<div id="noncoffee" class="grid"></div>

<div class="location">
  <h2>📍 Location</h2>
  <iframe
    src="https://www.google.com/maps?q=19.895000663346558,102.14216503795944&output=embed"
    width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
  </iframe>
</div>

<div class="mini-cart" onclick="toggleCart()">
  🛒 <span id="mini-count">0</span> | <span id="mini-total">0₭</span>
</div>

<div class="cart-overlay" id="cartOverlay">
  <div class="cart-content">
    <button class="close-btn" onclick="toggleCart()">← Back</button>
    <h2>Your Cart</h2>
    <ul id="cartItems"></ul>
    <button onclick="send()">Order via WhatsApp</button>
  </div>
</div>

<div class="float-order">
  <button onclick="send()">Order & Pay via WhatsApp</button>
</div>

<script>
let cart={};

const coffee=[
{name:"Espresso", price:35000, img:"https://instagram.fvte1-2.fna.fbcdn.net/v/t1.15752-9/662275341_1523126332750576_8705074191709453853_n.jpg?stp=dst-jpg_e15_tt6&_nc_cat=108&ccb=7-5&_nc_sid=fc17b8&efg=eyJxZV9ncm91cHMiOlsiaWdkX2Jlc3RfZWZmb3J0X2ltYWdlOnRlc3QiXX0%3D&_nc_ohc=4pU3vM6Y-5UQ7kNvwHLKr_z&_nc_oc=Adrku3_hGSOQfut9MI1KMUy-HLLa8vc6VZcun5Ge_UmHr5-B82C70ltkdFufsoiIO6s&_nc_zt=23&_nc_ht=instagram.fvte1-2.fna&_nc_ss=7a3a8&oh=03_Q7cD5AF_EORu4DEkMy-7KKXsiSfRxKeTNPWTDjjmBpoWdPoK4Q&oe=69F78979"},
{name:"Americano", price:30000, img:"https://lh3.googleusercontent.com/p/AF1QipMNIdVxrmejBbUAPNpJhInWns6-J2CF5G0gm-yM=s1024-v1"},
{name:"Cappuccino", price:35000, img:"https://lh3.googleusercontent.com/p/AF1QipMKMworzi8s5GbMqYHpoA1Ok1PmYv_CuVIKj2h5=s1024-v1"},
{name:"Latte", price:35000, img:"https://epe.brightspotcdn.com/d8/a4/212af2ed131184894538c9cd77ea/not-yet-1426593-640.png"},
{name:"Mocha", price:40000, img:"https://epe.brightspotcdn.com/d8/a4/212af2ed131184894538c9cd77ea/not-yet-1426593-640.png"},
{name:"Vanilla Latte", price:40000, img:"https://epe.brightspotcdn.com/d8/a4/212af2ed131184894538538c9cd77ea/not-yet-1426593-640.png"},
{name:"Caramel Latte", price:45000, img:"https://epe.brightspotcdn.com/d8/a4/212af2ed131184894538c9cd77ea/not-yet-1426593-640.png"},
{name:"Orange Coffee", price:45000, best:true, img:"https://lh3.googleusercontent.com/p/AF1QipNzVKul2lBkuLGKG3hraz9j7hPP255Sb8P48bgG=s508-k-no"},
{name:"Coconut Coffee", price:45000, best:true, img:"https://lh3.googleusercontent.com/p/AF1QipPUEszwlC50PdqTppFgmcc4BBN6dBe2-mBcrt1_=w203-h360-k-no"},
];

const noncoffee=[
{name:"Matcha Coconut", price:50000, img:"https://epe.brightspotcdn.com/d8/a4/212af2ed131184894538c9cd77ea/not-yet-1426593-640.png"},
{name:"Matcha Latte", price:45000, img:"https://epe.brightspotcdn.com/d8/a4/212af2ed131184894538c9cd77ea/not-yet-1426593-640.png"},
{name:"Strawberry Milk", price:35000, img:"https://epe.brightspotcdn.com/d8/a4/212af2ed131184894538c9cd77ea/not-yet-1426593-640.png"},
{name:"Cocoa Strawberry", price:45000, img:"https://epe.brightspotcdn.com/d8/a4/212af2ed131184894538c9cd77ea/not-yet-1426593-640.png"},
{name:"Cocoa Latte", price:35000, img:"https://epe.brightspotcdn.com/d8/a4/212af2ed131184894538c9cd77ea/not-yet-1426593-640.png"},
{name:"Matcha Strawberry", price:50000, img:"https://epe.brightspotcdn.com/d8/a4/212af2ed131184894538c9cd77ea/not-yet-1426593-640.png"},
{name:"Green Tea", price:35000, img:"https://lh3.googleusercontent.com/p/AF1QipPIWKyericBwDOVyOf-oVF8WV7t28uvjH-IduYh=w203-h360-k-no"},
{name:"Thai Milk Tea", price:35000, img:"https://lh3.googleusercontent.com/p/AF1QipMYzqYeUawWCvB4kdqIUkrenTo5xy-nC9oYDAEd=s846-k-no"},
{name:"Cocoa Coconut", price:45000, img:"https://epe.brightspotcdn.com/d8/a4/212af2ed131184894538c9cd77ea/not-yet-1426593-640.png"},
];

function add(name, btn){
  cart[name] = (cart[name] || 0) + 1;
  btn.classList.add('adding');
  setTimeout(()=>btn.classList.remove('adding'),300);
  updateMiniCart();
  renderCartOverlay();
  document.getElementById(`qty-${name}`).innerText = cart[name];
}

function remove(name){
  if(cart[name]){
    cart[name]--;
    if(cart[name]<=0) delete cart[name];
  }
  updateMiniCart();
  renderCartOverlay();
  document.getElementById(`qty-${name}`).innerText = cart[name] || 0;
}

function updateMiniCart(){
  let totalQty=0,totalPrice=0;
  [...coffee,...noncoffee].forEach(item=>{
    let qty=cart[item.name]||0;
    totalQty+=qty;
    totalPrice+=qty*item.price;
  });
  document.getElementById('mini-count').innerText=totalQty;
  document.getElementById('mini-total').innerText=totalPrice.toLocaleString()+"₭";
}

function toggleCart(){
  const overlay=document.getElementById('cartOverlay');
  overlay.style.display=overlay.style.display==='flex'?'none':'flex';
}

function renderCartOverlay(){
  const ul=document.getElementById('cartItems');
  ul.innerHTML='';
  for(let item in cart){
    let qty=cart[item];
    let price=[...coffee,...noncoffee].find(m=>m.name===item).price;
    ul.innerHTML+=`<li>${item} x${qty} - ${(qty*price).toLocaleString()}₭</li>`;
  }
}

function send(){
  if(Object.keys(cart).length===0){alert("Please add drinks!"); return;}
  
  let clientName = '';
  while(true){
    clientName = prompt("Please enter your name:", "");
    if(clientName && clientName.trim() !== "") break;
    alert("Name is required to place the order!");
  }

  const orderId = 'ODR' + Math.floor(1000 + Math.random() * 9000);
  let msg=`Order ${orderId} - ${clientName}:\n`;
  let total=0;
  for(let item in cart){
    let qty=cart[item];
    let price=[...coffee,...noncoffee].find(m=>m.name===item).price;
    total+=price*qty;
    msg+=`${item} x${qty}\n`;
  }
  msg+="Total: "+total.toLocaleString()+"₭";
  window.open("https://wa.me/8562092747227?text="+encodeURIComponent(msg));
}

function renderSection(list, containerId){
  const container=document.getElementById(containerId);
  container.innerHTML='';
  list.forEach(item=>{
    container.innerHTML+=`
      <div class="card">
        ${item.best?'<div class="badge">🔥 BEST SELLER</div>':''}
        <img src="${item.img}">
        <div class="card-content">
          <h3>${item.name}</h3>
          <p class="price">${item.price.toLocaleString()}₭</p>
          <div class="controls">
            <button onclick="remove('${item.name}')">-</button>
            <div id="qty-${item.name}" class="qty">${cart[item.name]||0}</div>
            <button onclick="add('${item.name}',this)">+</button>
          </div>
        </div>
      </div>
    `;
  });
}

function render(){
  renderSection(coffee,'coffee');
  renderSection(noncoffee,'noncoffee');
}

render();
</script>

</body>
</html>
